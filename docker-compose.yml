# Bestia vs Robots — Stack Swarm + Traefik (RenaceNet)
# Deploy: ./deploy.sh update
# Dominio fijo (Swarm interpola mal variables en labels a veces)

services:
  web:
    image: botgame-web:${GIT_SHA:-latest}
    build:
      context: .
      dockerfile: deploy/Dockerfile.web
    networks:
      - RenaceNet
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=RenaceNet"
        - "traefik.http.routers.botgame-web.rule=Host(`botgame.renace.tech`)"
        - "traefik.http.routers.botgame-web.entrypoints=websecure"
        - "traefik.http.routers.botgame-web.tls=true"
        - "traefik.http.routers.botgame-web.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.botgame-web.priority=10"
        - "traefik.http.services.botgame-web.loadbalancer.server.port=80"

  game-server:
    image: botgame-server:${GIT_SHA:-latest}
    build:
      context: .
      dockerfile: deploy/Dockerfile.server
    networks:
      - RenaceNet
    environment:
      BOTGAME_WS_PORT: "7777"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
      resources:
        limits:
          cpus: "0.50"
          memory: 768M
        reservations:
          cpus: "0.10"
          memory: 192M
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=RenaceNet"
        - "traefik.http.routers.botgame-ws.rule=Host(`botgame.renace.tech`) && PathPrefix(`/ws`)"
        - "traefik.http.routers.botgame-ws.entrypoints=websecure"
        - "traefik.http.routers.botgame-ws.tls=true"
        - "traefik.http.routers.botgame-ws.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.botgame-ws.priority=100"
        - "traefik.http.routers.botgame-ws.middlewares=botgame-ws-strip"
        - "traefik.http.middlewares.botgame-ws-strip.stripprefix.prefixes=/ws"
        - "traefik.http.services.botgame-ws.loadbalancer.server.port=7777"

networks:
  RenaceNet:
    external: true
