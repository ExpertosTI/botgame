server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types application/wasm application/javascript application/octet-stream text/plain text/css text/javascript application/json model/gltf-binary;
    gzip_vary on;

    location = /version.json {
        alias /usr/share/nginx/html/play/version.json;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Access-Control-Allow-Origin "*" always;
        default_type application/json;
    }

    location = / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header CDN-Cache-Control "no-store" always;
        try_files /index.html =404;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header CDN-Cache-Control "no-store" always;
    }

    location = /landing.css {
        add_header Cache-Control "no-store, max-age=0" always;
    }

    location = /landing.js {
        add_header Cache-Control "no-store, max-age=0" always;
    }

    location /media/ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate" always;
        access_log off;
    }

    location ~* \.glb$ {
        default_type model/gltf-binary;
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate" always;
        access_log off;
    }

    location = /play {
        return 301 /play/;
    }

    location /play/ {
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header CDN-Cache-Control "no-store" always;
        try_files $uri $uri/ /play/index.html;
    }

    location ~* ^/play/.*\.(js|wasm|pck)$ {
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header CDN-Cache-Control "no-store" always;
        access_log off;
    }

    location ~* \.(png|jpg|jpeg|svg|ico|woff2?|ttf|mp4|webm)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate" always;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    }
}
