server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Godot HTML5 (SharedArrayBuffer / threads-compatible headers)
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types application/wasm application/javascript application/octet-stream text/plain text/css text/javascript application/json;
    gzip_vary on;

    # —— SIEMPRE última versión: no cachear HTML ni el motor Godot ——
    # (index.js / .wasm / .pck mantienen el mismo nombre en cada export)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    location = / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        try_files /index.html =404;
    }

    location ~* \.(js|wasm|pck)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header CDN-Cache-Control "no-store" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        access_log off;
    }

    # Arte estático: cache corto con revalidación
    location ~* \.(png|jpg|jpeg|svg|ico|woff2?|ttf)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }
}
