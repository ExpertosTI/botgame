server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Godot HTML5
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # Compresión agresiva del .wasm (~34MB → mucho menos en tránsito)
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types application/wasm application/javascript application/octet-stream text/plain text/css text/javascript application/json;
    gzip_vary on;

    # HTML: no cachear (para que el deploy se vea al instante)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # Assets pesados: cache largo (cambia con cada rebuild de index.*)
    location ~* \.(wasm|pck)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        access_log off;
    }

    location ~* \.(js|png|svg|ico|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }
}
